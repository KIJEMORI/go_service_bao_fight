  #     - REDIS_HOST=redis:6379
  #   networks:
  #     - app-network

  minio:
    image: minio/minio
    # ports:
    #   - "9000:9000" # API
    #   - "9001:9001" # Консоль управления
    # env_file:
    #   - ./configs/minio.env
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    environment:
      MINIO_BROWSER_REDIRECT_URL: "http://localhost/minio-admin/"

  # gateway:
