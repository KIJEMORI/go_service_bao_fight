  #       limits:
  #         memory: 256M
  #         cpus: "0.5"

  redis:
    image: redis:7-alpine
    deploy:
      resources:
        limits:
          memory: 64M
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pg_data:

networks:
  app-network:
    driver: bridge
