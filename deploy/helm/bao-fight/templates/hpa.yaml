{{- range $name, $val := .Values.services }}
{{- if $val.hpa_enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $val.name }}-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $val.name }}
  minReplicas: {{ $val.replicas }}
  maxReplicas: 10 # Максимум 10 подов для этого сервиса
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70 # Если CPU > 70%, K8s создаст новый под
---
{{- end }}
{{- end }}
