apiVersion: v1
kind: Secret
metadata:
  name: bao-fight-secrets
type: Opaque
data:
  # Helm сам переведет строку в base64
  DB_CONFIG_USER: {{ .Values.secrets.DB_CONFIG_USER | toString | b64enc | quote }}
  DB_CONFIG_PASSWORD: {{ .Values.secrets.DB_CONFIG_PASSWORD | toString | b64enc | quote }}
  DB_CONFIG_DBNAME: {{ .Values.secrets.DB_CONFIG_DBNAME | toString | b64enc | quote }}
  JWT_SECRET: {{ .Values.secrets.JWT_SECRET | toString | b64enc | quote }}
  MINIO_ROOT_USER: {{ .Values.secrets.MINIO_ROOT_USER | toString | b64enc | quote }}
  MINIO_ROOT_PASSWORD: {{ .Values.secrets.MINIO_ROOT_PASSWORD | toString | b64enc | quote }}
