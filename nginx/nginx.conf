events {}
http {
    # proxy_cache_path — путь к папке внутри контейнера
    # levels=1:2 — иерархия папок (чтобы в одной папке не было 100к файлов)
    # keys_zone — название зоны и объем оперативной памяти для ключей (10MB хватит на ~80 000 ключей)
    # max_size — САМЫЙ ВАЖНЫЙ ПАРАМЕТР. Ограничиваем кэш на диске (например, 1 Гигабайт)
    # inactive — через сколько удалять файл, если к нему никто не обращался (24 часа)
    proxy_cache_path /var/cache/nginx/s3_cache levels=1:2 keys_zone=s3_cache:10m max_size=1g inactive=24h use_temp_path=off;

    # Создаем зону кэширования для лимитов.
    # $binary_remote_addr — ключ (IP пользователя).
    # 10m — размер памяти для хранения IP (хватит на ~160 000 адресов).
    # rate=5r/s — разрешаем 5 запросов в секунду (это 300 в минуту).
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s;

    # Зона для "тяжелых" действий (например, JoinChat или SendMessage)
    # Ограничиваем до 1 запроса в секунду.
    limit_req_zone $binary_remote_addr zone=action_limit:10m rate=1r/s;

    limit_req_zone $user_id zone=per_user:10m rate=5r/s;

    server {
        listen 80;
        server_name localhost;

        # Чтение фото (Геттеры)
        location /storage/ {
            proxy_cache s3_cache;
            proxy_cache_valid 200 24h;
            proxy_pass http://minio:9000/profiles/; # Внутреннее имя бакета
            proxy_set_header Host $http_host;

            proxy_intercept_errors on;
            error_page 404 = @fallback_cloud;
        }

        location @fallback_cloud {
            # Nginx сам идет в облако
            # proxy_pass https://s3.my-cloud-provider.com;
            # proxy_cache s3_cache; # Сразу кэшируем, чтобы в следующий раз не ходить в облако
            # proxy_cache_valid 200 24h;
        }

        # Прямая загрузка в S3 (PUT) через Gateway
        # Это позволит фронтенду слать PUT на localhost/s3-upload/
        location /s3-upload/ {
            rewrite ^/s3-upload/(.*) /profiles/$1 break;
            proxy_pass http://minio:9000;
            proxy_set_header Host minio:9000; # Маскируем хост для подписи S3
            client_max_body_size 10M;
        }

        location /minio-admin/ {

            rewrite ^/minio-admin/(.*) /$1 break;

            # Перенаправляем на внутренний порт консоли Minio
            proxy_pass http://minio:9001;

            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-NginX-Proxy true;

            # Важно для работы консоли (WebSocket и длинные запросы)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            chunked_transfer_encoding off;
            proxy_connect_timeout 300;
        }

        # Все ручки API
        location /api/ {

            # burst=10 — "всплеск": разрешаем накопить до 10 запросов, если юзер быстро кликает.
            # nodelay — выполнять запросы сразу, а не ставить в очередь.
            limit_req zone=api_limit burst=10 nodelay;

            proxy_pass http://producer-api:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        location /api/v1/prot/ {
            set $user_id "";
            set $user_role "";

            # ПОДКЛЮЧАЕМ ВНЕШНИЙ ФАЙЛ
            access_by_lua_file /usr/local/openresty/nginx/conf/lua/auth_limit.lua;

            # Применяем лимит
            limit_req zone=per_user burst=10 nodelay;

            proxy_pass http://producer-api:8080;
            proxy_set_header Host $host;
        }

        #location /api/v1/prot/join_chat {
            #limit_req zone=action_limit burst=2;

            #proxy_pass http://producer-api:8080;
        #}

        error_page 429 = @too_many_requests;
    }
}
