name: Full Stack Deploy (Docker + K8s)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Hard Cleanup Infrastructure
        run: |
          # Останавливаем всё, что могло остаться от прошлых билдов
          docker compose down -v || true
          k3d cluster delete bao-cluster || true
          docker volume rm pg_data || true

      - name: Install k3d & Helm
        run: |
          curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
          # Helm уже есть на раннере, но если нужно обновить:
          # curl https://raw.githubusercontent.com | bash

      - name: Start Infrastructure (Docker Compose)
        env:
          # Привязываем секреты GitHub к переменным окружения шага
          DB_CONFIG_USER: ${{ secrets.DB_CONFIG_USER }}
          DB_CONFIG_PASSWORD: ${{ secrets.DB_CONFIG_PASSWORD }}
          DB_CONFIG_DBNAME: ${{ secrets.DB_CONFIG_DBNAME }}
          MINIO_ROOT_USER: ${{ secrets.MINIO_ROOT_USER }}
          MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}
        run: |
          # Создаем сеть вручную, чтобы k3d мог к ней подключиться
          docker network create app-network || true
          # Передаем переменные напрямую в процесс docker-compose
          DB_CONFIG_USER=$DB_CONFIG_USER \
          DB_CONFIG_PASSWORD=$DB_CONFIG_PASSWORD \
          DB_CONFIG_DBNAME=$DB_CONFIG_DBNAME \
          MINIO_ROOT_USER=$MINIO_ROOT_USER \
          MINIO_ROOT_PASSWORD=$MINIO_ROOT_PASSWORD \
          docker compose up -d


          # Ждем, пока базы станут доступны (healthcheck из твоего compose)
          echo "Waiting for services health..."
          # Пример ожидания Postgres
          until [ "`docker inspect -f {{.State.Health.Status}} $(docker compose ps -q postgres)`" == "healthy" ]; do
            sleep 2
          done

      - name: Create k3d Cluster
        run: |
          # Получаем IP шлюза, чтобы k3d видел контейнеры Docker Compose
          GATEWAY_IP=$(docker network inspect app-network -f '{{range .IPAM.Config}}{{.Gateway}}{{end}}')

          # Создаем кластер в сети app-network
          # Отключаем traefik
          k3d cluster create bao-cluster \
            --network app-network \
            --no-lb \
            --k3s-arg "--disable=traefik@server:*" \
            --k3s-arg "--disable=local-storage@server:*" \
            --host-alias "$GATEWAY_IP:postgres,kafka,redis,minio"

      - name: Install Ingress Controller & Metrics Server
        run: |
          # Ставим Nginx Ingress
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.0/deploy/static/provider/cloud/deploy.yaml

          # Ставим Metrics Server (нужен HPA)
          kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
          kubectl patch deployment metrics-server -n kube-system --type='json' \
            -p='[{"op": "add", "path": "/spec/template/spec/containers/0/args/-", "value": "--kubelet-insecure-tls"}]'

      - name: Build and Deploy
        env:
          DB_USER: ${{ secrets.DB_CONFIG_USER }}
          DB_PASS: ${{ secrets.DB_CONFIG_PASSWORD }}
          JWT_KEY: ${{ secrets.JWT_SECRET }}
          MINIO_PASS: ${{ secrets.MINIO_ROOT_PASSWORD }}
        run: |
          # Собираем образ приложения
          docker build -t bao-fight:local .

          # Импортируем образ в k3d
          k3d image import bao-fight:local -c bao-cluster

          # Ждем готовности Ingress Controller (чтобы веб-трафик пошел)
          kubectl wait --namespace ingress-nginx \
            --for=condition=ready pod \
            --selector=app.kubernetes.io/component=controller \
            --timeout=120s



          # Деплоим Helm чарт
          helm upgrade --install bao-fight ./deploy/helm/bao-fight \
            --set image.tag=local \
            --set secrets.DB_CONFIG_USER="$DB_USER" \
            --set secrets.DB_CONFIG_PASSWORD="$DB_PASS" \
            --set secrets.JWT_SECRET="$JWT_KEY" \
            --set secrets.MINIO_ROOT_PASSWORD="$MINIO_PASS" \
            --wait


          kubectl get pods
          kubectl describe ingress
          kubectl get svc
